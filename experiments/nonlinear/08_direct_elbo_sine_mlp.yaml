name: nonlinear_direct_elbo_sine_mlp
benchmark: nonlinear
model: direct_elbo_sine_mlp
seed: 321
output_dir: outputs/nonlinear_direct_elbo_sine_mlp

data:
  batch_size: 128
  time_steps: 96
  x_pattern: sinusoidal
  x_cycles: 3.0
  x_amplitude: 1.0
  x_constant: 1.0
  x_missing_period: 4
  observation: x_sine

evaluation:
  seed_offset: 10000
  data:
    batch_size: 128

state_space:
  q: 0.1
  r: 0.1
  m0: 1.0
  p0: 10.0

training:
  steps: 250
  learning_rate: 0.001
  hidden_dim: 32
  num_elbo_samples: 16
  log_every: 50
  min_var: 0.000001

reference:
  grid_min: -16.0
  grid_max: 16.0
  num_grid: 1601
